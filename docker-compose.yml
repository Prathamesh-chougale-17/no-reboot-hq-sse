services:
  postgres:
    image: postgres:17.4-alpine
    environment:
      POSTGRES_DB: acme_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d acme_platform']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.2-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.4.2
    command: ['-config.file=/etc/loki/config.yml']
    ports:
      - '${LOKI_PORT:-3100}:3100'
    volumes:
      - ./infra/observability/loki-config.yml:/etc/loki/config.yml:ro

  tempo:
    image: grafana/tempo:2.7.2
    command: ['-config.file=/etc/tempo.yaml']
    ports:
      - '${TEMPO_PORT:-3200}:3200'
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.126.0
    command: ['--config=/etc/otelcol-contrib/config.yaml']
    depends_on:
      - tempo
    ports:
      - '${OTEL_GRPC_PORT:-4317}:4317'
      - '${OTEL_HTTP_PORT:-4318}:4318'
      - '${OTEL_METRICS_PORT:-8889}:8889'
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
    depends_on:
      - otel-collector
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.1.1
    depends_on:
      - loki
      - tempo
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - '${GRAFANA_PORT:-3002}:3000'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  postgres-data:
  grafana-data:
