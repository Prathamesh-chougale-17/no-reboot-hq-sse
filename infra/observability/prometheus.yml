global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: acme-api
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3001']
